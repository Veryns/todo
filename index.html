<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Planner & Calendar</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
</head>
<body>

    <div class="container">
        <header>
            <h1>My Daily Planner</h1>
        </header>

        <div class="main-layout">
            <aside class="calendar-section">
                <input type="date" id="datePicker">
                <div class="date-display">
                    <h2 id="selectedDateText">Pilih Tanggal</h2>
                </div>
            </aside>

            <main class="todo-section">
                <div class="input-group">
                    <input type="text" id="todoInput" placeholder="Tambah tugas baru...">
                    <button id="addBtn">Tambah</button>
                </div>

                <ul id="todoList">
                    </ul>
            </main>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
